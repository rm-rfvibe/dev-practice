stages:
  - build
  - test
  - notify

cache:
  paths:
    - .m2/repository/
    key: maven-repo

build-backend-code-job:
  stage: build
  script:
    - cd backend
    - mvn -B dependency:go-offline || true
    - mvn -B clean compile
    - mvn -B package -o
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 week

semgrep-sast:
  stage: test
  variables:
    COMPILE: "false"
    SAST_JAVA_VERSION: "16"
    MAVEN_REPO_PATH: "${CI_PROJECT_DIR}/.m2/repository"
  needs:
    - build-backend-code-job

sonarqube-backend-sast:
  stage: test
  image: maven:3.8-openjdk-16
  script:
    - cd backend
    - mvn verify sonar:sonar -Dsonar.projectKey=$SONAR_PROJECT_KEY_BACK -Dsonar.host.url=$SONARQUBE_URL -Dsonar.login=$SONAR_LOGIN_BACK -Dsonar.projectName="09_BASTRYKINA_BACKEND"
  needs:
    - build-backend-code-job
  allow_failure: true

telegram-notification-backend:
  stage: notify
  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /send notification/
  script:
    - |
      ARTIFACT_URL="$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_SHA/download?job=build-backend-code-job"
      echo "Telegram notification: Backend built successfully! Artifacts: $ARTIFACT_URL"
  needs:
    - build-backend-code-job