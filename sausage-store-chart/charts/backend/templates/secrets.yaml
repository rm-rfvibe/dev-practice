---
apiVersion: v1
kind: Secret
metadata:
  name: sausage-backend-secret-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: sausage-backend
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sausage-store
    env: "{{ .Values.environment }}"
type: Opaque
data:
  # These values should be base64 encoded
  # Example: echo -n "your-username" | base64
  database_username: {{ .Values.database.username | default "postgres" | b64enc | quote }}
  database_password: {{ .Values.database.password | default "postgres" | b64enc | quote }}
